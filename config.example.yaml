# ------------------------------------------------------------
# Migration configuration — reference example.
#
# Copy this file to config.yaml and edit it with real values for
# your migration. config.yaml is synced by DAB on every
# ``databricks bundle deploy`` from ``config.yaml`` in the bundle
# source to ``${workspace.file_path}/config.yaml`` on the
# workspace, so the workflow that reads it always sees the values
# from your latest deploy.
#
# Secret values (the SPN client secret itself) stay in the
# Databricks Secret Scope named by ``spn_secret_scope`` below.
# This file only references the scope/key; it never stores the
# secret value directly.
# ------------------------------------------------------------

# --- Workspaces (required) ---
source_workspace_url: https://adb-SOURCE.azuredatabricks.net
target_workspace_url: https://adb-TARGET.azuredatabricks.net

# --- SPN auth (required) ---
spn_client_id: REPLACE_WITH_APPLICATION_ID
spn_secret_scope: migration
spn_secret_key: spn-secret

# --- Scope: which source metastore domains to discover/migrate ---
# Default: UC only. Set include_hive=true to also cover the legacy
# hive_metastore catalog (discovery + migrate workflows will run Hive steps).
scope:
  include_uc: true
  include_hive: false

# --- Scoping ---
# Comma-separated; leave empty to include everything.
catalog_filter: ""
schema_filter: ""

# --- Behaviour ---
dry_run: false
batch_size: 50
tracking_catalog: migration_tracking
tracking_schema: cp_migration

# --- Hive options (Phase 2) ---
# Set migrate_hive_dbfs_root=true to include Hive managed tables stored in
# DBFS root; required in that case: hive_dbfs_target_path (ADLS path the
# migration SPN can write to).
migrate_hive_dbfs_root: false
hive_dbfs_target_path: ""
hive_target_catalog: hive_upgraded

# --- Iceberg managed tables (Phase 2.5.B) ---
# Set to "ddl_replay" to opt into Option A (CREATE TABLE + INSERT INTO
# via cp_migration_share). Loses snapshot history, time travel, branches
# and tags. Leave empty to skip Iceberg tables.
iceberg_strategy: ""

# --- Row filter / column mask on managed tables ---
# Delta Sharing refuses to share tables protected by legacy RLS/CM.
# ""                  — default: skip with status skipped_by_rls_cm_policy
# "drop_and_restore"  — strip policies on source, DEEP CLONE, then
#                       re-apply. Requires rls_cm_maintenance_window_confirmed=true.
rls_cm_strategy: ""

# Consent gate for rls_cm_strategy='drop_and_restore'. The strategy
# briefly exposes the source table (unfiltered / unmasked) during
# each DEEP CLONE. Set to true ONLY during a scheduled maintenance
# window — setup_sharing will refuse the strategy otherwise.
rls_cm_maintenance_window_confirmed: false
