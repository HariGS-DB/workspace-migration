# ------------------------------------------------------------
# Migration configuration.
#
# Edit this file locally and run ``databricks bundle deploy`` —
# DAB will sync it to ``${workspace.file_path}/config.yaml`` on
# the workspace, which is where the migration workflows read from.
#
# See config.example.yaml for a fully-commented reference.
#
# Secret values (the SPN client secret itself) stay in the
# Databricks Secret Scope named by ``spn_secret_scope`` below.
# This file only references the scope/key; it never stores the
# secret value directly.
# ------------------------------------------------------------

# --- Workspaces (required) ---
source_workspace_url: https://adb-7405617542499984.4.azuredatabricks.net
target_workspace_url: https://adb-7405606200983417.17.azuredatabricks.net

# --- SPN auth (required) ---
spn_client_id: d0354350-71fa-4bb4-aa55-8adb5dd9f1ae
spn_secret_scope: migration
spn_secret_key: spn-secret

# --- Scope: which source metastore domains to discover/migrate ---
# Default: UC only. Set include_hive=true to also cover the legacy
# hive_metastore catalog (discovery + migrate workflows will run Hive steps).
scope:
  include_uc: true
  include_hive: true

# --- Scoping ---
# Comma-separated; leave empty to include everything.
catalog_filter: ""
schema_filter: ""

# --- Behaviour ---
dry_run: false
batch_size: 50
tracking_catalog: migration_tracking
tracking_schema: cp_migration

# --- Hive options (Phase 2) ---
# Set migrate_hive_dbfs_root=true to include Hive managed tables stored in
# DBFS root; required in that case: hive_dbfs_target_path (ADLS path the
# migration SPN can write to).
migrate_hive_dbfs_root: true
hive_dbfs_target_path: "abfss://external-data@stextsourcemig36cd38.dfs.core.windows.net/hive_migrated"
hive_target_catalog: hive_upgraded

# --- Iceberg managed tables (Phase 2.5.B) ---
# DEEP CLONE does not support UC-managed Iceberg; 'ddl_replay' uses
# CREATE TABLE + INSERT INTO via cp_migration_share (Option A). Losses:
# snapshot history, time travel, branches/tags (target gets a compacted
# current-state snapshot). Leave unset / empty to skip Iceberg tables.
iceberg_strategy: ddl_replay
