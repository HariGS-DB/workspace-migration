bundle:
  name: workspace-migration

variables:
  job_prefix:
    default: "uc-migration"
  source_workspace_url:
    description: "Source workspace URL"
  target_workspace_url:
    description: "Target workspace URL"
  spn_client_id:
    description: "SPN application (client) ID"
  spn_secret_scope:
    description: "Databricks secret scope containing SPN secret"
    default: "migration"
  spn_secret_key:
    description: "Key name within the secret scope"
    default: "spn-secret"
  catalog_filter:
    description: "Comma-separated list of catalogs to migrate"
    default: ""
  schema_filter:
    description: "Comma-separated list of schemas to migrate"
    default: ""
  tracking_catalog:
    default: "migration_tracking"
  tracking_schema:
    default: "cp_migration"
  dry_run:
    default: "false"
  batch_size:
    default: "50"

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true

  test:
    mode: development

  prod:
    mode: production
