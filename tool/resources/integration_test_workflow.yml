resources:
  jobs:
    integration_test_workflow:
      name: "${var.job_prefix}-integration-test"
      tasks:
        - task_key: seed_test_data
          notebook_task:
            notebook_path: ../tests/integration/seed_test_data.py
          job_cluster_key: migration_cluster

        - task_key: pre_check
          depends_on:
            - task_key: seed_test_data
          notebook_task:
            notebook_path: ../src/pre_check/pre_check.py
          job_cluster_key: migration_cluster

        - task_key: discovery
          depends_on:
            - task_key: pre_check
          notebook_task:
            notebook_path: ../src/discovery/discovery.py
          job_cluster_key: migration_cluster

        - task_key: migrate
          depends_on:
            - task_key: discovery
          notebook_task:
            notebook_path: ../src/migrate/orchestrator.py
          job_cluster_key: migration_cluster

        - task_key: test_end_to_end
          depends_on:
            - task_key: migrate
          notebook_task:
            notebook_path: ../tests/integration/test_end_to_end.py
          job_cluster_key: migration_cluster

        - task_key: teardown
          depends_on:
            - task_key: seed_test_data
            - task_key: pre_check
            - task_key: discovery
            - task_key: migrate
            - task_key: test_end_to_end
          run_if: ALL_DONE
          notebook_task:
            notebook_path: ../tests/integration/teardown.py
          job_cluster_key: migration_cluster

      job_clusters:
        - job_cluster_key: migration_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_D4ds_v5"
            num_workers: 0
            data_security_mode: "SINGLE_USER"
