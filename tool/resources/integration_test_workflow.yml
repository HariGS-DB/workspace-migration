resources:
  jobs:
    integration_test_workflow:
      name: "${var.job_prefix}-integration-test"
      parameters:
        - name: source_workspace_url
          default: "${var.source_workspace_url}"
        - name: target_workspace_url
          default: "${var.target_workspace_url}"
        - name: spn_client_id
          default: "${var.spn_client_id}"
        - name: spn_secret_scope
          default: "${var.spn_secret_scope}"
        - name: spn_secret_key
          default: "${var.spn_secret_key}"
        - name: catalog_filter
          default: "integration_test_src"
        - name: schema_filter
          default: "${var.schema_filter}"
        - name: tracking_catalog
          default: "${var.tracking_catalog}"
        - name: tracking_schema
          default: "${var.tracking_schema}"
        - name: dry_run
          default: "${var.dry_run}"
        - name: batch_size
          default: "${var.batch_size}"
      tasks:
        - task_key: seed_test_data
          notebook_task:
            notebook_path: ../tests/integration/seed_test_data.py

        - task_key: pre_check
          depends_on:
            - task_key: seed_test_data
          notebook_task:
            notebook_path: ../src/pre_check/pre_check.py

        - task_key: discovery
          depends_on:
            - task_key: pre_check
          notebook_task:
            notebook_path: ../src/discovery/discovery.py

        - task_key: migrate
          depends_on:
            - task_key: discovery
          run_job_task:
            job_id: ${resources.jobs.migrate.id}

        - task_key: test_end_to_end
          depends_on:
            - task_key: migrate
          notebook_task:
            notebook_path: ../tests/integration/test_end_to_end.py

        - task_key: teardown
          depends_on:
            - task_key: seed_test_data
            - task_key: pre_check
            - task_key: discovery
            - task_key: migrate
            - task_key: test_end_to_end
          run_if: ALL_DONE
          notebook_task:
            notebook_path: ../tests/integration/teardown.py
