bundle:
  name: workspace-migration

variables:
  job_prefix:
    default: "uc-migration"

workspace:
  # Deploy to a Shared workspace path so the bundle and its sibling config.yaml
  # are visible to all migration admins, not scoped to the deployer. DAB only
  # manages ${root_path}/files/ and ${root_path}/state/ — config.yaml lives
  # outside those, alongside, and survives redeploys.
  root_path: /Shared/cp_migration/${bundle.target}

# Acknowledge the shared path; operators should tighten to a dedicated
# admin group in prod (replace 'users' with e.g. 'migration_admins').
permissions:
  - level: CAN_MANAGE
    group_name: users

include:
  - resources/*.yml

targets:
  dev:
    default: true
    presets:
      # Development presets (dev-mode tags + random job names) without the
      # `mode: development` per-user path enforcement, so the bundle can deploy
      # to the Shared root_path declared above.
      name_prefix: "[dev-${workspace.current_user.short_name}] "
      tags:
        dev: "${workspace.current_user.userName}"

  test:
    presets:
      name_prefix: "[test] "

  prod:
    mode: production
