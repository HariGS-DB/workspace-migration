resources:
  jobs:
    uc_integration_test:
      name: "${var.job_prefix}-uc-integration-test"
      description: "End-to-end integration test for the UC migration workflow."
      run_as:
        service_principal_name: ${var.migration_spn_id}
      tasks:
        - task_key: setup_test_config
          notebook_task:
            notebook_path: ../tests/integration/setup_test_config.py
            # UC integration test: UC on, Hive off, Iceberg DDL replay on,
            # RLS/CM drop_and_restore with maintenance-window consent so
            # the P.1 end-to-end fixture (strip → clone → restore) can
            # exercise the full flow. Hive DBFS-root stays off so we
            # don't need an external-location grant for the UC-only suite.
            base_parameters:
              include_uc: "true"
              include_hive: "false"
              iceberg_strategy: "ddl_replay"
              rls_cm_strategy: "drop_and_restore"
              rls_cm_maintenance_window_confirmed: "true"
              migrate_hive_dbfs_root: "false"
              hive_dbfs_target_path: ""

        - task_key: seed_uc
          depends_on:
            - task_key: setup_test_config
          notebook_task:
            notebook_path: ../tests/integration/seed_uc_test_data.py

        - task_key: pre_check
          depends_on:
            - task_key: seed_uc
          notebook_task:
            notebook_path: ../src/pre_check/pre_check.py

        - task_key: discovery
          depends_on:
            - task_key: pre_check
          notebook_task:
            notebook_path: ../src/discovery/discovery.py

        - task_key: migrate
          depends_on:
            - task_key: discovery
          run_job_task:
            job_id: ${resources.jobs.migrate.id}

        - task_key: test_uc
          depends_on:
            - task_key: migrate
          notebook_task:
            notebook_path: ../tests/integration/test_uc_end_to_end.py

        - task_key: teardown_uc
          depends_on:
            - task_key: setup_test_config
            - task_key: seed_uc
            - task_key: pre_check
            - task_key: discovery
            - task_key: migrate
            - task_key: test_uc
          run_if: ALL_DONE
          notebook_task:
            notebook_path: ../tests/integration/teardown_uc.py
