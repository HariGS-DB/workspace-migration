resources:
  jobs:
    hive_integration_test:
      name: "${var.job_prefix}-hive-integration-test"
      description: "End-to-end integration test for the Hive migration workflow."
      tasks:
        - task_key: seed_hive
          notebook_task:
            notebook_path: ../tests/integration/seed_hive_test_data.py

        - task_key: pre_check
          depends_on:
            - task_key: seed_hive
          notebook_task:
            notebook_path: ../src/pre_check/pre_check.py

        - task_key: hive_discovery
          depends_on:
            - task_key: pre_check
          notebook_task:
            notebook_path: ../src/discovery/hive_discovery.py

        - task_key: hive_migrate
          depends_on:
            - task_key: hive_discovery
          run_job_task:
            job_id: ${resources.jobs.hive_migrate.id}

        - task_key: test_hive
          depends_on:
            - task_key: hive_migrate
          notebook_task:
            notebook_path: ../tests/integration/test_hive_end_to_end.py

        - task_key: teardown_hive
          depends_on:
            - task_key: seed_hive
            - task_key: pre_check
            - task_key: hive_discovery
            - task_key: hive_migrate
            - task_key: test_hive
          run_if: ALL_DONE
          notebook_task:
            notebook_path: ../tests/integration/teardown_hive.py
